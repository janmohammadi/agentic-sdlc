<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Agentic SDLC — Specific-Group Austria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Inter+Tight:wght@600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Lora:wght@400;500;600&family=Courier+Prime:wght@400;700&family=Caveat:wght@500;600&display=swap"
    rel="stylesheet"
  />
  <!-- apply the saved theme before first paint to avoid a flash; "pro" is the default -->
  <script>
    try {
      document.documentElement.dataset.theme = localStorage.getItem("sdlc-theme") || "pro";
    } catch (e) {
      document.documentElement.dataset.theme = "pro";
    }
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>
  <script src="vendor/htm-preact-standalone.umd.js"></script>
  <script src="vendor/marked.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
